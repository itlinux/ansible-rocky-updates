# ============================================
# hosts.ini
# ============================================
# Red Hat / Rocky Linux Servers Inventory
# 
# Instructions:
# 1. Replace the sample entries below with your actual Rocky Linux servers
# 2. Update the IP addresses to match your infrastructure
# 3. Adjust the SSH key path if your key is located elsewhere
# 4. Modify ansible_port if using non-standard SSH port

[rocky_servers]
# Format: hostname ansible_host=IP_ADDRESS
# Add your Red Hat / Rocky Linux servers below:

remo-linux-servers-01 ansible_host=192.168.1.10
remo-linux-servers-02 ansible_host=192.168.1.11
remo-linux-servers-03 ansible_host=192.168.1.12

# You can also use IP addresses directly without hostnames:
# 192.168.1.14
# 192.168.1.15

[rocky_servers:vars]
# ===== Authentication Settings =====
# Use root user for all operations
ansible_user=root

# Path to your SSH private key
# Update this path if your SSH key is located elsewhere
ansible_ssh_private_key_file=~/.ssh/yoursshkey

# Alternative: Use a dedicated Ansible key
# ansible_ssh_private_key_file=~/.ssh/ansible_id_rsa

# ===== SSH Connection Settings =====
ansible_connection=ssh
ansible_port=22

# SSH timeout (increase if you have slow connections)
ansible_ssh_timeout=30

# Disable host key checking (use with caution in production)
# For production, consider removing this and properly managing known_hosts
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'

# For production with known_hosts management:
# ansible_ssh_common_args='-o StrictHostKeyChecking=yes'

# ===== Python Settings =====
# Rocky Linux 8+ uses Python 3
ansible_python_interpreter=/usr/bin/python3

# ===== Performance Tuning =====
# Enable pipelining for faster execution
ansible_pipelining=true

[web_servers]
# Format: hostname ansible_host=IP_ADDRESS
# Add your Rocky Linux servers below:

#remo-linux-servers-02.example.com ansible_host=192.168.1.11
#remo-linux-servers-03.example.com ansible_host=192.168.1.12
#remo-linux-servers-04.example.com ansible_host=192.168.1.13

# You can also use IP addresses directly without hostnames:
# 192.168.1.14
# 192.168.1.15

[web_servers:vars]
# ===== Authentication Settings =====
# Use root user for all operations
ansible_user=root

# Path to your SSH private key
# Update this path if your SSH key is located elsewhere
ansible_ssh_private_key_file=~/.ssh/dc_servers

# Alternative: Use a dedicated Ansible key
# ansible_ssh_private_key_file=~/.ssh/ansible_id_rsa

# ===== SSH Connection Settings =====
ansible_connection=ssh
ansible_port=22

# SSH timeout (increase if you have slow connections)
ansible_ssh_timeout=30

# Disable host key checking (use with caution in production)
# For production, consider removing this and properly managing known_hosts
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'

# For production with known_hosts management:
# ansible_ssh_common_args='-o StrictHostKeyChecking=yes'

# ===== Python Settings =====
# Rocky Linux 8+ uses Python 3
ansible_python_interpreter=/usr/bin/python3

# ===== Performance Tuning =====
# Enable pipelining for faster execution
ansible_pipelining=true

# Control concurrent connections (forks)
# Adjust based on your control machine capabilities
# ansible_forks=5

# ===== Privilege Escalation =====
# Not needed since we're already using root
# If you switch to non-root user, uncomment these:
# ansible_become=yes
# ansible_become_method=sudo
# ansible_become_user=root

# ===== Optional: Group-Specific Settings =====
# You can create additional groups with different settings

# Example: Staging servers with different settings
# [rocky_staging]
# rocky-stage-01.example.com ansible_host=192.168.2.10
# 
# [rocky_staging:vars]
# ansible_user=root
# ansible_ssh_private_key_file=~/.ssh/staging_key

# Example: Production servers requiring jump host
# [rocky_production]
# remo-linux-servers-db-01.example.com ansible_host=10.0.1.10
# 
# [rocky_production:vars]
# ansible_user=root
# ansible_ssh_private_key_file=~/.ssh/prod_key
# ansible_ssh_common_args='-o ProxyCommand="ssh -W %h:%p -q jump-host.example.com"'
